<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Chubby white/cream cat based on real photo -->
  <!-- Ears - smaller, rounder relative to head -->
  <path d="M14 10 L16 24 L26 17 Z" fill="#e8ddd0"/>
  <path d="M50 10 L48 24 L38 17 Z" fill="#e8ddd0"/>
  <!-- Inner ears - pink -->
  <path d="M17 14 L18 22 L24 17 Z" fill="#e8b0b0"/>
  <path d="M47 14 L46 22 L40 17 Z" fill="#e8b0b0"/>
  <!-- Head - wider at cheeks, flatter top, tapers to chin -->
  <path d="M18 18 Q12 26 10 34 Q10 42 16 46 Q22 52 32 54 Q42 52 48 46 Q54 42 54 34 Q52 26 46 18 Q40 14 32 14 Q24 14 18 18 Z" fill="#ede4d8"/>
  <!-- Cheek fluff - softer, not perfectly round -->
  <path d="M10 34 Q8 38 10 42 Q12 44 16 44 Q14 40 14 36 Z" fill="#f0e8dc"/>
  <path d="M54 34 Q56 38 54 42 Q52 44 48 44 Q50 40 50 36 Z" fill="#f0e8dc"/>
  <!-- White muzzle area -->
  <path d="M22 38 Q20 42 24 48 Q28 52 32 52 Q36 52 40 48 Q44 42 42 38 Q38 36 32 36 Q26 36 22 38 Z" fill="#f8f4ee"/>
  <!-- Tabby markings around eyes - grey/brown like the photo -->
  <path d="M18 24 Q22 20 28 22 Q26 26 22 28 Q18 28 18 24 Z" fill="#9a8878" opacity="0.5"/>
  <path d="M46 24 Q42 20 36 22 Q38 26 42 28 Q46 28 46 24 Z" fill="#9a8878" opacity="0.5"/>
  <!-- Forehead M marking -->
  <path d="M26 20 L30 17 L32 20 L34 17 L38 20" stroke="#a09080" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Eyes - round, grey-green like the photo -->
  <ellipse cx="24" cy="28" rx="3.5" ry="3.2" fill="#8aaa7a"/>
  <ellipse cx="40" cy="28" rx="3.5" ry="3.2" fill="#8aaa7a"/>
  <!-- Darker ring around iris -->
  <ellipse cx="24" cy="28" rx="3.5" ry="3.2" fill="none" stroke="#607050" stroke-width="0.5"/>
  <ellipse cx="40" cy="28" rx="3.5" ry="3.2" fill="none" stroke="#607050" stroke-width="0.5"/>
  <!-- Pupils -->
  <ellipse cx="24" cy="28" rx="1.5" ry="3" fill="#1a1a1a"/>
  <ellipse cx="40" cy="28" rx="1.5" ry="3" fill="#1a1a1a"/>
  <!-- Eye highlights -->
  <circle cx="25.5" cy="26.8" r="0.9" fill="#fff" opacity="0.85"/>
  <circle cx="41.5" cy="26.8" r="0.9" fill="#fff" opacity="0.85"/>
  <!-- Eye liner subtle -->
  <path d="M20 28 Q22 25 24 24.8" stroke="#6a5a4a" stroke-width="0.4" fill="none"/>
  <path d="M44 28 Q42 25 40 24.8" stroke="#6a5a4a" stroke-width="0.4" fill="none"/>
  <!-- Nose - pink, prominent -->
  <path d="M30 37 Q32 40 34 37 Q32 35.5 30 37 Z" fill="#e8a0a0"/>
  <path d="M30 37 Q32 40 34 37" fill="none" stroke="#d08888" stroke-width="0.4"/>
  <!-- Nose bridge -->
  <line x1="32" y1="34" x2="32" y2="36" stroke="#d0c4b8" stroke-width="0.5" opacity="0.4"/>
  <!-- Mouth -->
  <path d="M32 40 L32 41.5" stroke="#c0b0a0" stroke-width="0.6"/>
  <path d="M28.5 42 Q32 45.5 35.5 42" stroke="#c0b0a0" stroke-width="0.7" fill="none"/>
  <!-- Chin tuft -->
  <ellipse cx="32" cy="50" rx="4" ry="2.5" fill="#f8f4ee" opacity="0.5"/>
  <!-- Whiskers - white, wispy -->
  <line x1="14" y1="36" x2="2" y2="32" stroke="#fff" stroke-width="0.6" opacity="0.7"/>
  <line x1="13" y1="39" x2="1" y2="39" stroke="#fff" stroke-width="0.6" opacity="0.7"/>
  <line x1="14" y1="42" x2="2" y2="46" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="36" x2="62" y2="32" stroke="#fff" stroke-width="0.6" opacity="0.7"/>
  <line x1="51" y1="39" x2="63" y2="39" stroke="#fff" stroke-width="0.6" opacity="0.7"/>
  <line x1="50" y1="42" x2="62" y2="46" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
</svg>
